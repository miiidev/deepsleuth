name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release archive
        run: |
          zip -r "deepsleuth-${{ github.ref_name }}.zip" . \
            -x "frontend/node_modules/*" \
            -x "frontend/src/*" \
            -x "frontend/public/*" \
            -x "frontend/tsconfig.json" \
            -x "frontend/vite.config.ts" \
            -x "frontend/package.json" \
            -x "frontend/package-lock.json" \
            -x "frontend/components.json" \
            -x "frontend/index.html" \
            -x "backend/venv/*" \
            -x "backend/__pycache__/*" \
            -x "backend/*/__pycache__/*" \
            -x ".venv/*" \
            -x "**/__pycache__/*" \
            -x "data/raw/*" \
            -x "data/processed/*" \
            -x "data/splits/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".opencode/*" \
            -x ".superpowers/*" \
            -x "*.egg-info/*" \
            -x "weights/*" \
            -x "node_modules/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: deepsleuth-${{ github.ref_name }}.zip
          generate_release_notes: true
